<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Catalog Images - CollectorsHub Retail</title>
  <style>
    :root {
      --border: #233451;
      --text: #e7eefb;
      --soft: #9fb0cf;
    }

    * { box-sizing: border-box; }

    body {
      margin: 0;
      font-family: "Sora", "Segoe UI", Tahoma, sans-serif;
      color: var(--text);
      background: linear-gradient(135deg, #060b14 0%, #0a1424 50%, #0c1a2f 100%);
    }

    .app { display: grid; grid-template-columns: 270px 1fr; min-height: 100vh; }

    .sidebar {
      border-right: 1px solid var(--border);
      background: rgba(10, 18, 33, 0.88);
      padding: 24px 16px;
    }

    .brand { padding: 10px 10px 14px; border-bottom: 1px solid rgba(159, 176, 207, 0.15); }
    .brand h1 { margin: 0; font-size: 1.15rem; }
    .brand p { margin: 6px 0 0; color: var(--soft); font-size: 0.82rem; }

    .nav { display: flex; flex-direction: column; gap: 8px; margin-top: 18px; }
    .nav-item {
      color: var(--soft);
      text-decoration: none;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid transparent;
    }
    .nav-item.active,
    .nav-item:hover {
      color: var(--text);
      border-color: rgba(51, 195, 255, 0.36);
      background: rgba(51, 195, 255, 0.12);
    }

    .content { display: flex; flex-direction: column; }
    .topbar {
      min-height: 76px;
      border-bottom: 1px solid var(--border);
      background: rgba(8, 16, 30, 0.78);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 10px 24px;
    }

    .main { padding: 20px 24px; display: flex; flex-direction: column; gap: 16px; }

    .subnav { display: flex; flex-wrap: wrap; gap: 8px; }
    .subnav a {
      color: var(--soft);
      text-decoration: none;
      border: 1px solid rgba(56, 89, 136, 0.55);
      border-radius: 999px;
      padding: 7px 10px;
      font-size: 0.8rem;
    }
    .subnav a.active {
      color: var(--text);
      border-color: rgba(51, 195, 255, 0.6);
      background: rgba(51, 195, 255, 0.14);
    }

    .section {
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      background: rgba(13, 22, 40, 0.76);
    }

    .btn {
      border: 1px solid rgba(56, 89, 136, 0.55);
      background: rgba(18, 31, 53, 0.95);
      color: var(--text);
      padding: 9px 12px;
      border-radius: 10px;
      cursor: pointer;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 6px;
      margin-bottom: 10px;
    }

    .field input,
    .field select {
      width: 100%;
      padding: 10px;
      border-radius: 10px;
      border: 1px solid rgba(56, 89, 136, 0.7);
      background: #0e1a2e;
      color: var(--text);
    }

    table { width: 100%; border-collapse: collapse; margin-top: 12px; font-size: 0.85rem; }
    th, td { padding: 10px; border-bottom: 1px solid rgba(35, 52, 81, 0.5); text-align: left; }
    th { color: var(--soft); font-size: 0.76rem; text-transform: uppercase; }

    .status { min-height: 18px; color: var(--soft); font-size: 0.82rem; }

    .img-thumb {
      width: 52px;
      height: 52px;
      object-fit: cover;
      border-radius: 8px;
      border: 1px solid rgba(56, 89, 136, 0.6);
    }

    @media (max-width: 980px) {
      .app { grid-template-columns: 1fr; }
      .main { padding: 14px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">
        <h1>CollectorsHub Retail</h1>
        <p>Platform Administration</p>
      </div>
      <nav class="nav">
        <a class="nav-item" href="/admin-dashboard.html">Dashboard</a>
        <a class="nav-item" href="/admin-stores.html">Stores</a>
        <a class="nav-item" href="/admin-users.html">Users</a>
        <a class="nav-item active" href="/admin-catalog.html">Catalog</a>
        <a class="nav-item" href="/admin-settings.html">Settings</a>
      </nav>
    </aside>

    <div class="content">
      <header class="topbar">
        <h2 style="margin: 0; font-size: 1.05rem;">Images</h2>
        <button class="btn" id="sign-out" type="button">Sign Out</button>
      </header>

      <main class="main">
        <div class="subnav">
          <a href="/admin-catalog-items.html">Catalog Items</a>
          <a href="/admin-catalog-variants.html">Variants</a>
          <a href="/admin-catalog-categories.html">Categories</a>
          <a class="active" href="/admin-catalog-images.html">Images</a>
          <a href="/admin-catalog-duplicates.html">Duplicate Finder</a>
          <a href="/admin-catalog-requests.html">Catalog Requests</a>
        </div>

        <section class="section">
          <h3 style="margin-top: 0;">Upload / Replace Image</h3>
          <div class="field">
            <label>Variant</label>
            <select id="variant"></select>
          </div>
          <div class="field">
            <label>Image File</label>
            <input id="image-file" type="file" accept="image/png,image/jpeg,image/webp" />
          </div>
          <div class="field">
            <label>Or use direct image URL</label>
            <input id="image-url" type="url" placeholder="https://..." />
          </div>
          <div style="display: flex; gap: 8px; flex-wrap: wrap;">
            <button class="btn" id="upload" type="button">Upload Image</button>
            <button class="btn" id="replace" type="button">Replace Primary Image</button>
            <button class="btn" id="rebuild" type="button">Rebuild Thumbnails</button>
          </div>
          <p class="status" id="form-status"></p>
        </section>

        <section class="section">
          <h3 style="margin-top: 0;">Variant Images</h3>
          <table id="images-table">
            <thead>
              <tr>
                <th>Preview</th>
                <th>Variant ID</th>
                <th>Image URL</th>
                <th>Primary</th>
                <th>Actions</th>
              </tr>
            </thead>
            <tbody><tr><td colspan="5">Loading...</td></tr></tbody>
          </table>
          <p class="status" id="table-status"></p>
        </section>
      </main>
    </div>
  </div>

  <script src="./supabase-config.js"></script>
  <script type="module">
    import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";

    var USER_ROLE_KEY = "collectorshub_retail_user_role";
    var ALLOWED = ["server_admin", "admin", "catalog_manager"];
    var IMAGE_BUCKET = "catalog-images";

    var supabase = createClient(window.SUPABASE_CONFIG.url, window.SUPABASE_CONFIG.anonKey);
    var rows = [];

    function esc(v) {
      return String(v || "")
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;");
    }

    async function verify() {
      var session = (await supabase.auth.getSession()).data.session;
      if (!session) {
        window.location.href = "/index.html";
        return false;
      }

      var row = await supabase
        .from("server_users")
        .select("role")
        .eq("auth_user_id", session.user.id)
        .eq("is_active", true)
        .maybeSingle();

      var role = (!row.error && row.data) ? row.data.role : null;
      if (!role) {
        var localRole = localStorage.getItem(USER_ROLE_KEY);
        if (localRole && ALLOWED.indexOf(localRole) >= 0) {
          role = localRole;
        }
      }

      if (!role || ALLOWED.indexOf(role) < 0) {
        await supabase.auth.signOut();
        window.location.href = "/index.html";
        return false;
      }

      return true;
    }

    async function loadVariants() {
      var sel = document.getElementById("variant");
      sel.innerHTML = '<option value="">Select variant...</option>';

      var res = await supabase
        .from("variants")
        .select("id,catalog_items(name)")
        .eq("is_active", true)
        .order("created_at", { ascending: false })
        .limit(300);

      if (res.error) return;

      (res.data || []).forEach(function(v) {
        var itemName = v.catalog_items && v.catalog_items.name ? v.catalog_items.name : "Item";
        sel.innerHTML += '<option value="' + v.id + '">' + esc(itemName) + ' - ' + v.id + '</option>';
      });
    }

    async function loadImages() {
      var tbody = document.querySelector("#images-table tbody");
      tbody.innerHTML = '<tr><td colspan="5">Loading...</td></tr>';

      var res = await supabase
        .from("variant_images")
        .select("id,variant_id,image_url,storage_path,is_primary")
        .order("created_at", { ascending: false })
        .limit(500);

      if (res.error) {
        tbody.innerHTML = '<tr><td colspan="5">variant_images table unavailable or access denied.</td></tr>';
        document.getElementById("table-status").textContent = res.error.message;
        return;
      }

      rows = res.data || [];

      if (!rows.length) {
        tbody.innerHTML = '<tr><td colspan="5">No images found.</td></tr>';
        return;
      }

      tbody.innerHTML = rows.map(function(i) {
        return '<tr>' +
          '<td><img class="img-thumb" src="' + esc(i.image_url) + '" alt="img" /></td>' +
          '<td>' + esc(i.variant_id) + '</td>' +
          '<td><a href="' + esc(i.image_url) + '" target="_blank" rel="noreferrer">' + esc(i.image_url) + '</a></td>' +
          '<td>' + (i.is_primary ? "Yes" : "No") + '</td>' +
          '<td><button data-act="delete" data-id="' + i.id + '">Delete</button></td>' +
          '</tr>';
      }).join("");
    }

    function buildStoragePath(variantId, fileName) {
      var safeFile = String(fileName || "image")
        .toLowerCase()
        .replace(/[^a-z0-9._-]+/g, "-")
        .replace(/^-+|-+$/g, "");
      return "variants/" + variantId + "/" + Date.now() + "-" + safeFile;
    }

    async function uploadImage(replacePrimary) {
      var variantId = document.getElementById("variant").value;
      var imageUrlInput = document.getElementById("image-url");
      var imageFileInput = document.getElementById("image-file");
      var status = document.getElementById("form-status");

      var imageUrl = imageUrlInput.value.trim();
      var file = imageFileInput.files && imageFileInput.files[0] ? imageFileInput.files[0] : null;

      if (!variantId) {
        status.textContent = "Variant is required.";
        return;
      }

      if (!file && !imageUrl) {
        status.textContent = "Provide either an image file or image URL.";
        return;
      }

      status.textContent = "Saving image...";

      var finalUrl = imageUrl;
      var storagePath = null;

      if (file) {
        storagePath = buildStoragePath(variantId, file.name);
        var upload = await supabase.storage
          .from(IMAGE_BUCKET)
          .upload(storagePath, file, {
            contentType: file.type || "application/octet-stream",
            upsert: false
          });

        if (upload.error) {
          status.textContent = "Upload failed: " + upload.error.message;
          return;
        }

        var publicUrlResult = supabase.storage.from(IMAGE_BUCKET).getPublicUrl(storagePath);
        finalUrl = publicUrlResult && publicUrlResult.data ? publicUrlResult.data.publicUrl : null;
      }

      if (!finalUrl) {
        status.textContent = "Could not determine image URL after upload.";
        return;
      }

      if (replacePrimary) {
        await supabase
          .from("variant_images")
          .update({ is_primary: false })
          .eq("variant_id", variantId);
      }

      var insertRes = await supabase
        .from("variant_images")
        .insert([{
          variant_id: variantId,
          image_url: finalUrl,
          storage_path: storagePath,
          is_primary: replacePrimary
        }]);

      if (insertRes.error) {
        status.textContent = "Error: " + insertRes.error.message;
        return;
      }

      status.textContent = replacePrimary ? "Primary image replaced and saved." : "Image uploaded and saved.";
      imageUrlInput.value = "";
      imageFileInput.value = "";
      loadImages();
    }

    async function deleteImage(id) {
      if (!confirm("Delete this image?")) return;

      var row = rows.find(function(r) { return r.id === id; });

      if (row && row.storage_path) {
        await supabase.storage.from(IMAGE_BUCKET).remove([row.storage_path]);
      }

      var res = await supabase
        .from("variant_images")
        .delete()
        .eq("id", id);

      if (res.error) {
        document.getElementById("table-status").textContent = "Delete failed: " + res.error.message;
        return;
      }

      loadImages();
    }

    async function rebuildThumbnails() {
      var variantId = document.getElementById("variant").value;
      var status = document.getElementById("form-status");

      if (!variantId) {
        status.textContent = "Select a variant first to rebuild thumbnails.";
        return;
      }

      var res = await supabase
        .from("variant_images")
        .update({ thumb_status: "pending" })
        .eq("variant_id", variantId);

      if (res.error) {
        status.textContent = "Rebuild queue failed: " + res.error.message;
        return;
      }

      status.textContent = "Thumbnail rebuild queued for selected variant.";
      loadImages();
    }

    document.getElementById("upload").addEventListener("click", function() {
      uploadImage(false);
    });

    document.getElementById("replace").addEventListener("click", function() {
      uploadImage(true);
    });

    document.getElementById("rebuild").addEventListener("click", rebuildThumbnails);

    document.querySelector("#images-table tbody").addEventListener("click", function(e) {
      var btn = e.target.closest("button");
      if (!btn) return;
      deleteImage(btn.getAttribute("data-id"));
    });

    document.getElementById("sign-out").addEventListener("click", async function() {
      await supabase.auth.signOut();
      window.location.href = "/index.html";
    });

    (async function init() {
      var ok = await verify();
      if (!ok) return;
      await loadVariants();
      await loadImages();
    })();
  </script>
</body>
</html>
