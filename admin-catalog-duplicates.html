<!doctype html>
<html lang="en"><head><meta charset="UTF-8" /><meta name="viewport" content="width=device-width, initial-scale=1.0" /><title>Duplicate Finder - CollectorsHub Retail</title><style>:root{--border:#233451;--text:#e7eefb;--soft:#9fb0cf;}*{box-sizing:border-box;}body{margin:0;font-family:"Sora","Segoe UI",Tahoma,sans-serif;color:var(--text);background:linear-gradient(135deg,#060b14 0%,#0a1424 50%,#0c1a2f 100%)}.app{display:grid;grid-template-columns:270px 1fr;min-height:100vh}.sidebar{border-right:1px solid var(--border);background:rgba(10,18,33,.88);padding:24px 16px}.brand{padding:10px 10px 14px;border-bottom:1px solid rgba(159,176,207,.15)}.brand h1{margin:0;font-size:1.15rem}.brand p{margin:6px 0 0;color:var(--soft);font-size:.82rem}.nav{display:flex;flex-direction:column;gap:8px;margin-top:18px}.nav-item{color:var(--soft);text-decoration:none;padding:10px 12px;border-radius:10px;border:1px solid transparent}.nav-item.active,.nav-item:hover{color:var(--text);border-color:rgba(51,195,255,.36);background:rgba(51,195,255,.12)}.content{display:flex;flex-direction:column}.topbar{min-height:76px;border-bottom:1px solid var(--border);background:rgba(8,16,30,.78);display:flex;align-items:center;justify-content:space-between;padding:10px 24px}.main{padding:20px 24px;display:flex;flex-direction:column;gap:16px}.subnav{display:flex;flex-wrap:wrap;gap:8px}.subnav a{color:var(--soft);text-decoration:none;border:1px solid rgba(56,89,136,.55);border-radius:999px;padding:7px 10px;font-size:.8rem}.subnav a.active{color:var(--text);border-color:rgba(51,195,255,.6);background:rgba(51,195,255,.14)}.section{border:1px solid var(--border);border-radius:14px;padding:16px;background:rgba(13,22,40,.76)}.btn{border:1px solid rgba(56,89,136,.55);background:rgba(18,31,53,.95);color:var(--text);padding:9px 12px;border-radius:10px;cursor:pointer}.field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px}.field input,.field select{width:100%;padding:10px;border-radius:10px;border:1px solid rgba(56,89,136,.7);background:#0e1a2e;color:var(--text)}table{width:100%;border-collapse:collapse;margin-top:12px;font-size:.85rem}th,td{padding:10px;border-bottom:1px solid rgba(35,52,81,.5);text-align:left}th{color:var(--soft);font-size:.76rem;text-transform:uppercase}.status{min-height:18px;color:var(--soft);font-size:.82rem}@media(max-width:980px){.app{grid-template-columns:1fr}.main{padding:14px}}</style></head><body><div class="app"><aside class="sidebar"><div class="brand"><h1>CollectorsHub Retail</h1><p>Platform Administration</p></div><nav class="nav"><a class="nav-item" href="/admin-dashboard.html">Dashboard</a><a class="nav-item" href="/admin-stores.html">Stores</a><a class="nav-item" href="/admin-users.html">Users</a><a class="nav-item active" href="/admin-catalog.html">Catalog</a><a class="nav-item" href="/admin-settings.html">Settings</a></nav></aside><div class="content"><header class="topbar"><h2 style="margin:0;font-size:1.05rem;">Duplicate Finder</h2><button class="btn" id="sign-out" type="button">Sign Out</button></header><main class="main"><div class="subnav"><a href="/admin-catalog-items.html">Catalog Items</a><a href="/admin-catalog-variants.html">Variants</a><a href="/admin-catalog-categories.html">Categories</a><a href="/admin-catalog-images.html">Images</a><a class="active" href="/admin-catalog-duplicates.html">Duplicate Finder</a><a href="/admin-catalog-requests.html">Catalog Requests</a></div><section class="section"><h3 style="margin-top:0;">Scan for Duplicates</h3><div class="field"><label>Name similarity check</label><input id="name" type="text" placeholder="Enter item name" /></div><div class="field"><label>Category</label><select id="category"></select></div><div class="field"><label>UPC exact match check</label><input id="upc" type="text" placeholder="Optional UPC" /></div><div class="field"><label>Platform + Edition similarity check</label><input id="platform-edition" type="text" placeholder="e.g., PS5 Standard" /></div><button class="btn" id="scan" type="button">Scan</button><p class="status" id="scan-status"></p></section><section class="section"><h3 style="margin-top:0;">Possible Duplicates</h3><table id="dups-table"><thead><tr><th>Item</th><th>Variant</th><th>Match Source</th><th>Actions</th></tr></thead><tbody><tr><td colspan="4">Run a scan.</td></tr></tbody></table><p class="status" id="merge-status"></p></section></main></div></div><script src="./supabase-config.js"></script><script type="module">import { createClient } from "https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/+esm";var USER_ROLE_KEY="collectorshub_retail_user_role";var ALLOWED=["server_admin","admin","catalog_manager"];var supabase=createClient(window.SUPABASE_CONFIG.url,window.SUPABASE_CONFIG.anonKey);var dupRows=[];function esc(v){return String(v||"").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;");}async function verify(){var s=(await supabase.auth.getSession()).data.session;if(!s){window.location.href="/index.html";return false;}var r=await supabase.from("server_users").select("role").eq("auth_user_id",s.user.id).eq("is_active",true).maybeSingle();var role=!r.error&&r.data?r.data.role:null;if(!role){var lr=localStorage.getItem(USER_ROLE_KEY);if(lr&&ALLOWED.indexOf(lr)>=0)role=lr;}if(!role||ALLOWED.indexOf(role)<0){await supabase.auth.signOut();window.location.href="/index.html";return false;}return true;}async function loadCategories(){var res=await supabase.from("catalog_categories").select("id,name").eq("is_active",true).order("name");var sel=document.getElementById("category");sel.innerHTML='<option value="">Select...</option>';(res.data||[]).forEach(function(c){sel.innerHTML+='<option value="'+c.id+'">'+esc(c.name)+'</option>';});}async function runScan(){var name=document.getElementById("name").value.trim();var categoryId=document.getElementById("category").value;var upc=document.getElementById("upc").value.trim();var platformEdition=document.getElementById("platform-edition").value.trim();var tbody=document.querySelector("#dups-table tbody");var status=document.getElementById("scan-status");if(!name||!categoryId){status.textContent="Name and category are required for similarity scan.";return;}status.textContent="Scanning...";var byName=await supabase.rpc("check_catalog_duplicates",{p_name:name,p_category_id:categoryId,p_subcategory_id:null});var rows=[];if(!byName.error&&byName.data){rows=rows.concat(byName.data.map(function(r){return {id:r.id,item_name:r.item_name,variant_display_name:r.variant_display_name,source:"Name similarity"};}));}if(upc){var byUpc=await supabase.from("variants").select("catalog_item_id,upc,catalog_items(name),platform_or_format,edition").eq("upc",upc).eq("is_active",true);if(!byUpc.error){rows=rows.concat((byUpc.data||[]).map(function(v){return {id:v.catalog_item_id,item_name:v.catalog_items&&v.catalog_items.name?v.catalog_items.name:"-",variant_display_name:(v.platform_or_format||"")+" "+(v.edition||""),source:"UPC match"};}));}}if(platformEdition){var pe=platformEdition.toLowerCase();var byPe=await supabase.from("variants").select("catalog_item_id,platform_or_format,edition,catalog_items(name)").eq("is_active",true).limit(200);if(!byPe.error){(byPe.data||[]).forEach(function(v){var key=((v.platform_or_format||"")+" "+(v.edition||"")).toLowerCase();if(key.indexOf(pe)>=0||pe.indexOf(key)>=0){rows.push({id:v.catalog_item_id,item_name:v.catalog_items&&v.catalog_items.name?v.catalog_items.name:"-",variant_display_name:(v.platform_or_format||"")+" "+(v.edition||""),source:"Platform+Edition similarity"});}});}}dupRows=rows; if(!rows.length){tbody.innerHTML='<tr><td colspan="4">No potential duplicates found.</td></tr>'; status.textContent="Scan complete."; return;} tbody.innerHTML=rows.map(function(r,i){return '<tr><td>'+esc(r.item_name)+'</td><td>'+esc(r.variant_display_name||"-")+'</td><td>'+esc(r.source)+'</td><td><button data-idx="'+i+'" data-act="merge">Merge...</button></td></tr>';}).join(""); status.textContent="Scan complete.";}async function mergeRow(idx){var row=dupRows[idx];if(!row)return;var target=prompt("Enter target catalog item ID to merge INTO:\nDuplicate item to merge FROM:\n"+row.id,row.id);if(!target||target===row.id)return;var status=document.getElementById("merge-status");status.textContent="Merging...";var move=await supabase.from("variants").update({catalog_item_id:target}).eq("catalog_item_id",row.id);if(move.error){status.textContent="Merge failed moving variants: "+move.error.message;return;}var deactivate=await supabase.from("catalog_items").update({is_active:false}).eq("id",row.id);if(deactivate.error){status.textContent="Variants moved, but source item deactivation failed: "+deactivate.error.message;return;}status.textContent="Merge complete.";}document.getElementById("scan").addEventListener("click",runScan);document.querySelector("#dups-table tbody").addEventListener("click",function(e){var b=e.target.closest("button");if(!b)return;mergeRow(Number(b.getAttribute("data-idx")));});document.getElementById("sign-out").addEventListener("click",async function(){await supabase.auth.signOut();window.location.href="/index.html";});(async function init(){var ok=await verify();if(!ok)return;await loadCategories();})();</script></body></html>
